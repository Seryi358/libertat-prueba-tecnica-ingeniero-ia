<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Libertat{% endblock %}</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #17242b;
      --muted: #5d6f78;
      --line: #d9e4e2;
      --brand: #0f6f63;
      --brand-dark: #0d4f48;
      --accent: #e7b84b;
      --soft: #f4f8f7;
      --white: #ffffff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background: linear-gradient(180deg, #eef6f4 0%, #ffffff 34%);
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      padding: 18px clamp(20px, 4vw, 56px);
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.88);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .brand {
      font-weight: 800;
      letter-spacing: 0;
      color: var(--brand-dark);
      font-size: 1.1rem;
    }
    nav { display: flex; gap: 10px; flex-wrap: wrap; }
    nav a, .button {
      appearance: none;
      border: 1px solid var(--brand);
      background: var(--brand);
      color: var(--white);
      border-radius: 6px;
      padding: 10px 14px;
      text-decoration: none;
      font-weight: 700;
      cursor: pointer;
      min-height: 40px;
    }
    nav a.secondary, .button.secondary {
      background: var(--white);
      color: var(--brand-dark);
      border-color: var(--line);
    }
    main {
      width: min(1120px, calc(100% - 32px));
      margin: 32px auto 64px;
    }
    .panel {
      background: var(--white);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 18px 45px rgba(20, 54, 52, 0.08);
      padding: clamp(22px, 4vw, 40px);
    }
    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1.1fr) minmax(280px, 0.9fr);
      gap: clamp(24px, 5vw, 56px);
      align-items: start;
    }
    h1, h2, h3 { margin: 0; line-height: 1.08; letter-spacing: 0; }
    h1 { font-size: clamp(2rem, 5vw, 4rem); max-width: 850px; }
    h2 { font-size: clamp(1.45rem, 3vw, 2.1rem); margin-bottom: 16px; }
    h3 { font-size: 1rem; margin-bottom: 8px; }
    p { color: var(--muted); line-height: 1.6; }
    form { display: grid; gap: 16px; }
    label { display: grid; gap: 7px; font-weight: 700; color: var(--ink); }
    input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 12px 13px;
      font: inherit;
      background: #fbfdfc;
      min-height: 44px;
    }
    input[type="radio"] {
      width: 20px;
      height: 20px;
      min-height: 0;
      margin-top: 2px;
      padding: 0;
      flex: 0 0 auto;
    }
    .question {
      border-top: 1px solid var(--line);
      padding: 18px 0;
    }
    .options { display: grid; gap: 10px; margin-top: 12px; }
    .option {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 12px;
      background: var(--soft);
      font-weight: 600;
    }
    .option span { flex: 1; }
    .summary {
      border-left: 4px solid var(--accent);
      padding: 14px 16px;
      background: #fffaf0;
      margin: 20px 0;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      background: var(--white);
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
    }
    th, td {
      text-align: left;
      padding: 12px;
      border-bottom: 1px solid var(--line);
      vertical-align: top;
    }
    th { background: var(--soft); font-size: 0.9rem; }
    .status {
      display: inline-block;
      border-radius: 999px;
      padding: 4px 10px;
      background: #e9f6ef;
      color: #17633b;
      font-weight: 800;
      font-size: 0.86rem;
    }
    .status.reprobado { background: #fff1ef; color: #9d2d21; }
    @media (max-width: 760px) {
      header { align-items: flex-start; flex-direction: column; }
      .hero { grid-template-columns: 1fr; }
      table { display: block; overflow-x: auto; }
    }
  </style>
</head>
<body>
  <header>
    <div class="brand">Libertat · Automatizacion educativa</div>
    <nav>
      <a href="/" class="secondary">Registro</a>
      <a href="/dashboard">Dashboard</a>
    </nav>
  </header>
  <main>{% block content %}{% endblock %}</main>
</body>
</html>
